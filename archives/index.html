<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Áudio Descrição</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Áudio descrição</h1>
  <p id="msg">Carregando áudio...</p>

  <audio id="audio" autoplay muted playsinline></audio>

  <script>
    const audio = document.getElementById("audio");
    const msg = document.getElementById("msg");

    let ultimoToque = 0;
    const delayDuplo = 400; 

    function tocarDescricao() {
      audio.src = "arroz-rice.mp3";
      audio.muted = false;
      audio.currentTime = 0;
      audio.play();

      msg.innerText = "Reproduzindo descrição...";
    }

    function tocarNutricional() {
      audio.src = "tabela-nutricional.mp3";
      audio.muted = false;
      audio.currentTime = 0;
      audio.play();

      msg.innerText = "Reproduzindo tabela nutricional...";
    }

    function detectarToque() {
      const agora = new Date().getTime();

      if (agora - ultimoToque < delayDuplo) {
        
        tocarNutricional();
      } else {
        
        setTimeout(() => {
          if (new Date().getTime() - ultimoToque >= delayDuplo) {
            tocarDescricao();
          }
        }, delayDuplo);
      }

      ultimoToque = agora;
    }

    
    audio.addEventListener("ended", () => {
      msg.innerText = "Toque uma vez para ouvir a descrição ou duas vezes para tabela nutricional.";
    });

    
    window.addEventListener("load", () => {
      audio.src = "descricao.mp3";

      audio.play().then(() => {
        audio.muted = false;
      }).catch(() => {
        msg.innerText = "Toque na tela para começar.";
      });
    });

    
    // document.addEventListener("click", detectarToque);
    document.addEventListener("pointerdown", detectarToque);
  </script>

</body>
</html>
