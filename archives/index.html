<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Áudio Descrição</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      cursor: pointer;
    }
    button {
      font-size: 20px;
      padding: 15px 30px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Áudio descrição</h1>
  <p id="msg">Carregando áudio...</p>

  <audio id="audio" autoplay muted playsinline>
  <source src="audio.mp3" type="audio/mpeg">
</audio>

  <script>
  const audio = document.getElementById("audio");
  const msg = document.getElementById("msg");

  function tocarAudio() {
    audio.muted = false;
    audio.currentTime = 0;

    audio.play();
    msg.innerText = "Reproduzindo...";
  }

  
  audio.addEventListener("ended", () => {
    msg.innerText = "Toque em qualquer lugar da tela para ouvir a descrição.";
  });

  
  window.addEventListener("load", () => {
    audio.play().catch(() => {
      msg.innerText = "Toque em qualquer lugar da tela para ouvir a descrição.";
    });
  });

  
  document.addEventListener("click", tocarAudio);
  document.addEventListener("touchstart", tocarAudio);
</script>

</body>
</html>
